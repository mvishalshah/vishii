<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>J.A.R.V.I.S — Personal AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#050a12;--surface:#0b1422;--panel:#0f1e30;
  --border:#1a3a5c;--accent:#00c8ff;--accent2:#0055dd;
  --glow:rgba(0,200,255,0.18);--text:#c8e6f5;--muted:#4a7a9b;
  --danger:#ff4060;--green:#00ff88;
  --fhud:'Orbitron',monospace;--fbody:'Rajdhani',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fbody);font-size:16px}
.screen{display:none;width:100%;height:100vh}
.screen.active{display:flex}

/* LOGIN */
#login-screen{align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,#001a33 0%,transparent 70%),var(--bg)}
.login-card{position:relative;width:380px;display:flex;align-items:center;justify-content:center}
.hud-ring{position:absolute;width:340px;height:340px;border-radius:50%;border:1px solid var(--border);box-shadow:0 0 40px var(--glow),inset 0 0 40px var(--glow);animation:spin 18s linear infinite;pointer-events:none}
.hud-ring::before{content:'';position:absolute;inset:12px;border-radius:50%;border:1px dashed rgba(0,200,255,0.15)}
@keyframes spin{to{transform:rotate(360deg)}}
.login-inner{position:relative;z-index:1;text-align:center;padding:44px 32px;background:rgba(11,20,34,0.95);border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(14px);width:310px}
.logo-icon{font-size:2.8rem;margin-bottom:8px;display:block;animation:pglow 3s ease-in-out infinite}
@keyframes pglow{0%,100%{filter:drop-shadow(0 0 8px var(--accent))}50%{filter:drop-shadow(0 0 20px var(--accent))}}
.logo-text{font-family:var(--fhud);font-size:1.9rem;font-weight:900;letter-spacing:0.22em;color:var(--accent);text-shadow:0 0 20px var(--accent)}
.logo-sub{font-size:0.62rem;color:var(--muted);letter-spacing:0.1em;margin:4px 0 22px;text-transform:uppercase}
.login-info{font-size:0.88rem;color:var(--muted);margin-bottom:26px;line-height:1.5}
.btn-google{display:flex;align-items:center;gap:10px;background:#fff;color:#333;font-family:var(--fbody);font-weight:600;font-size:0.95rem;border:none;border-radius:9px;padding:13px 24px;cursor:pointer;margin:0 auto;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.6)}
.privacy-note{margin-top:18px;font-size:0.72rem;color:var(--muted);line-height:1.6}

/* APP */
#app-screen{flex-direction:row}
#sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px;gap:18px}
.sidebar-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.user-badge{display:flex;align-items:center;gap:9px;overflow:hidden}
#user-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;flex-shrink:0;box-shadow:0 0 10px rgba(0,200,255,0.3)}
.uname{font-family:var(--fhud);font-size:0.65rem;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ustatus{font-size:0.7rem;color:var(--green)}
#logout-btn{background:none;border:1px solid var(--border);color:var(--danger);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:1rem;flex-shrink:0;transition:background .15s}
#logout-btn:hover{background:rgba(255,64,96,0.12)}
.sidebar-nav{display:flex;flex-direction:column;gap:5px}
.nav-btn{background:none;border:1px solid transparent;color:var(--muted);font-family:var(--fbody);font-size:0.92rem;font-weight:600;padding:10px 13px;border-radius:9px;cursor:pointer;text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--panel);color:var(--text)}
.nav-btn.active{background:rgba(0,200,255,0.08);border-color:var(--accent);color:var(--accent)}
.sidebar-footer{margin-top:auto}
.enc-badge{font-size:0.68rem;color:var(--muted);display:block;text-align:center;padding:8px;border:1px solid var(--border);border-radius:7px}

#main-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab{display:none;flex-direction:column;height:100vh;overflow:hidden}
.tab.active{display:flex}

/* CHAT */
#chat-box{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#chat-box::-webkit-scrollbar{width:4px}
#chat-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{max-width:74%;padding:12px 16px;border-radius:13px;line-height:1.65;font-size:0.95rem;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent2),#002a80);color:#fff;border-bottom-right-radius:3px}
.msg.ai{align-self:flex-start;background:var(--panel);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px}
.msg-label{font-family:var(--fhud);font-size:0.6rem;color:var(--accent);margin-bottom:5px;letter-spacing:0.12em}
.typing-dots{display:inline-flex;gap:4px;padding:2px 0}
.typing-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:dbounce .8s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dbounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

#input-bar{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);align-items:center}
#chat-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--fbody);font-size:0.95rem;padding:11px 14px;outline:none;transition:border-color .2s}
#chat-input:focus{border-color:var(--accent)}
#chat-input::placeholder{color:var(--muted)}
#send-btn{background:var(--accent);color:#000;border:none;border-radius:9px;padding:11px 22px;font-family:var(--fhud);font-size:0.75rem;font-weight:700;cursor:pointer;letter-spacing:0.06em;transition:opacity .15s}
#send-btn:hover{opacity:0.85}
#mic-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:9px;width:44px;height:44px;font-size:1.15rem;cursor:pointer;transition:all .15s;flex-shrink:0}
#mic-btn.listening{border-color:var(--danger);background:rgba(255,64,96,0.12);animation:mpulse 1s infinite}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,64,96,0.4)}50%{box-shadow:0 0 0 8px rgba(255,64,96,0)}}
#mic-status{text-align:center;font-size:0.76rem;color:var(--danger);padding:2px 20px 5px;min-height:18px;background:var(--surface)}

/* MEMORY */
.tab-header{display:flex;align-items:center;gap:14px;padding:20px 28px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-header h2{font-family:var(--fhud);font-size:0.85rem;color:var(--accent);letter-spacing:0.12em;flex:1}
.btn-accent{background:rgba(0,200,255,0.08);border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:8px 16px;font-family:var(--fbody);font-weight:600;font-size:0.84rem;cursor:pointer;transition:background .15s}
.btn-accent:hover{background:rgba(0,200,255,0.18)}
.add-form{display:none;flex-direction:column;gap:10px;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.add-form.open{display:flex}
.add-form input,.add-form textarea{background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:var(--fbody);font-size:0.9rem;padding:10px 13px;border-radius:8px;outline:none;resize:vertical;transition:border-color .2s}
.add-form input:focus,.add-form textarea:focus{border-color:var(--accent)}
.add-form input::placeholder,.add-form textarea::placeholder{color:var(--muted)}
.add-form textarea{min-height:80px}
.add-form button{align-self:flex-start;background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 22px;font-family:var(--fhud);font-size:0.75rem;font-weight:700;cursor:pointer}
#memory-list{flex:1;overflow-y:auto;padding:16px 28px;display:flex;flex-direction:column;gap:10px}
#memory-list::-webkit-scrollbar{width:4px}
#memory-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.memory-card{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:14px 16px;position:relative;animation:fadeUp .3s ease}
.memory-card h4{font-family:var(--fhud);font-size:0.72rem;color:var(--accent);margin-bottom:7px}
.memory-card p{font-size:0.88rem;color:var(--text);line-height:1.55;padding-right:28px}
.memory-del{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;transition:color .15s}
.memory-del:hover{color:var(--danger)}
.empty-state{color:var(--muted);font-size:0.88rem;text-align:center;padding:40px 20px}

#toast{position:fixed;bottom:30px;right:30px;z-index:9998;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:9px;font-size:0.88rem;box-shadow:0 8px 30px rgba(0,0,0,0.4);transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--danger);color:var(--danger)}

@media(max-width:640px){
  #sidebar{width:58px;min-width:58px;padding:12px 6px;gap:12px}
  .uname,.ustatus,.sidebar-footer{display:none}
  .nav-btn{padding:10px;text-align:center;font-size:1.1rem}
  .user-badge{justify-content:center}
  .tab-header{padding:14px 16px 10px}
  #chat-box{padding:16px}
  #input-bar{padding:10px 12px}
  #memory-list{padding:12px 14px}
  .add-form{padding:12px 14px}
}
</style>
</head>

// ── MATH ENGINE ──────────────────────────────────────
function tryMath(input) {
  var clean = input.toLowerCase()
    .replace(/what is|calculate|compute|solve|equals|equal to/gi,"")
    .replace(/plus/gi,"+").replace(/minus/gi,"-")
    .replace(/times|multiplied by|x/gi,"*")
    .replace(/divided by|over/gi,"/")
    .replace(/squared/gi,"**2")
    .replace(/square root of/gi,"Math.sqrt(")
    .replace(/percent of/gi,"*0.01*")
    .trim();

  // Close unclosed sqrt parentheses
  if (clean.indexOf("Math.sqrt(") > -1 && clean.indexOf(")") === -1) {
    clean = clean + ")";
  }

  try {
    // Only allow safe math characters
    if (/^[0-9\s\+\-\*\/\.\(\)Math\.sqrtpow%e]+$/.test(clean.replace(/Math\.sqrt/g,"").replace(/Math\.pow/g,""))) {
      var result = eval(clean);
      if (typeof result === "number" && isFinite(result)) {
        return "The answer is " + (Number.isInteger(result) ? result : result.toFixed(4).replace(/\.?0+$/, "")) + " ✓";
      }
    }
  } catch(e) {}
  return null;
}

// ── BRAIN SEARCH ─────────────────────────────────────
function jarvisThink(input, memories) {
  var q = input.toLowerCase().trim();

  // Time/Date special
  var now = new Date();
  if (/\btime\b/.test(q)) {
    return "The current time is " + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ".";
  }
  if (/\bdate\b|\btoday\b/.test(q)) {
    return "Today is " + now.toLocaleDateString("en-US", {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + ".";
  }
  if (/\bday\b/.test(q)) {
    var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    return "Today is " + days[now.getDay()] + ".";
  }

  // Math
  if (/\d/.test(q) || /plus|minus|times|divide|percent|square root|calculate/.test(q)) {
    var mathResult = tryMath(input);
    if (mathResult) { return mathResult; }
  }

  // Memory-based personal answers
  if (memories && memories.length > 0) {
    for (var m = 0; m < memories.length; m++) {
      var mem = memories[m];
      var keywords = (mem.title + " " + mem.content).toLowerCase().split(/\s+/);
      var matchCount = 0;
      var qWords = q.split(/\s+/);
      for (var w = 0; w < qWords.length; w++) {
        if (qWords[w].length > 3 && keywords.some(function(k){ return k.indexOf(qWords[w]) > -1; })) {
          matchCount++;
        }
      }
      if (matchCount >= 1) {
        return "Based on what I know about you — " + mem.title + ": " + mem.content;
      }
    }
  }

  // Score each brain entry
  var bestScore = 0;
  var bestEntry = null;

  for (var i = 0; i < BRAIN.length; i++) {
    var entry = BRAIN[i];
    if (entry.tags[0] === "__default__") { continue; }
    var score = 0;
    for (var t = 0; t < entry.tags.length; t++) {
      var tag = entry.tags[t].toLowerCase();
      if (q === tag) { score += 10; }
      else if (q.indexOf(tag) > -1) { score += 5; }
      else {
        var tagWords = tag.split(" ");
        for (var tw = 0; tw < tagWords.length; tw++) {
          if (tagWords[tw].length > 2 && q.indexOf(tagWords[tw]) > -1) { score += 2; }
        }
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestEntry = entry;
    }
  }

  // Get default fallback
  var defaultEntry = null;
  for (var d = 0; d < BRAIN.length; d++) {
    if (BRAIN[d].tags[0] === "__default__") { defaultEntry = BRAIN[d]; break; }
  }

  var chosen = (bestScore >= 2 && bestEntry) ? bestEntry : defaultEntry;
  var responses = chosen.responses;
  return responses[Math.floor(Math.random() * responses.length)];
}

    loginBtn.disabled = false;
  }
});

// Tabs
document.querySelectorAll(".nav-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".nav-btn").forEach(function(b) { b.classList.remove("active"); });
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
  });
});

// Chat
sendBtn.addEventListener("click", handleSend);
chatInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") { handleSend(); }
});

function handleSend() {
  var text = chatInput.value.trim();
  if (!text || !currentUser) { return; }
  chatInput.value = "";
  addUserMessage(text);

  // Simulate thinking delay for natural feel
  var typing = addTyping();
  var delay = 400 + Math.random() * 600;
  setTimeout(function() {
    typing.remove();
    var reply = jarvisThink(text, userMemories);
    addAIMessage(reply);

    // Save to Firestore
    db.collection("users").doc(currentUser.uid).collection("chats").add({
      user: text, ai: reply,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(){});
  }, delay);
}

function addUserMessage(text) {
  var div = document.createElement("div");
  div.className = "msg user";
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addAIMessage(text) {
  var div = document.createElement("div");
  div.className = "msg ai";
  div.innerHTML = "<div class='msg-label'>J.A.R.V.I.S</div>" + safe(text);
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  speak(text);
}

function addTyping() {
  var div = document.createElement("div");
  div.className = "msg ai";
  div.innerHTML = "<div class='msg-label'>J.A.R.V.I.S</div><div class='typing-dots'><span></span><span></span><span></span></div>";
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

// Voice Input
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var recog = null;
if (SR) {
  recog = new SR();
  recog.lang = "en-US";
  recog.interimResults = false;
  recog.onresult = function(e) {
    var t = e.results[0][0].transcript;
    chatInput.value = t;
    micStatus.textContent = "Heard: \"" + t + "\"";
    setTimeout(function() { micStatus.textContent = ""; }, 3000);
    handleSend();
  };
  recog.onend = function() { micBtn.classList.remove("listening"); micBtn.textContent = "🎤"; };
  recog.onerror = function(e) { micStatus.textContent = "Mic: " + e.error; micBtn.classList.remove("listening"); micBtn.textContent = "🎤"; };
}

micBtn.addEventListener("click", function() {
  if (!SR) { showToast("Use Chrome for voice support.","error"); return; }
  if (micBtn.classList.contains("listening")) { recog.stop(); return; }
  micBtn.classList.add("listening");
  micBtn.textContent = "🔴";
  micStatus.textContent = "Listening…";
  try { recog.start(); } catch(e) { micBtn.classList.remove("listening"); micBtn.textContent = "🎤"; }
});

// Voice Output
function speak(text) {
  if (!window.speechSynthesis) { return; }
  window.speechSynthesis.cancel();
  // Strip emojis for cleaner speech
  var clean = text.replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|•/gu, "").trim();
  var u = new SpeechSynthesisUtterance(clean);
  u.rate = 0.93; u.pitch = 0.82; u.volume = 1;
  var voices = window.speechSynthesis.getVoices();
  var pick = null;
  for (var i = 0; i < voices.length; i++) {
    if (/google uk english male|microsoft david|daniel|alex/i.test(voices[i].name)) { pick = voices[i]; break; }
  }
  if (!pick && voices.length > 0) { pick = voices[0]; }
  if (pick) { u.voice = pick; }
  window.speechSynthesis.speak(u);
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

// Memories
addMemBtn.addEventListener("click", function() { memForm.classList.toggle("open"); });

saveMemBtn.addEventListener("click", function() {
  var title = memTitle.value.trim();
  var content = memContent.value.trim();
  if (!title || !content) { showToast("Fill both fields.", "error"); return; }
  saveMemBtn.textContent = "Saving…";
  saveMemBtn.disabled = true;
  db.collection("users").doc(currentUser.uid).collection("memories").add({
    title: title, content: content,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    memTitle.value = ""; memContent.value = "";
    memForm.classList.remove("open");
    showToast("Memory saved!", "success");
    loadMemories(function(){});
  }).catch(function(e) {
    showToast("Error: " + e.message, "error");
  }).finally(function() {
    saveMemBtn.textContent = "Save Memory";
    saveMemBtn.disabled = false;
  });
});

function loadMemories(callback) {
  if (!currentUser) { if(callback) callback(); return; }
  memList.innerHTML = "<p class='empty-state'>Loading…</p>";
  userMemories = [];
  db.collection("users").doc(currentUser.uid).collection("memories")
    .orderBy("ts","desc").get().then(function(snap) {
      memList.innerHTML = "";
      if (snap.empty) {
        memList.innerHTML = "<p class='empty-state'>No memories yet. Add things JARVIS should remember about you — your job, schedule, preferences, etc.</p>";
        if(callback) callback();
        return;
      }
      snap.forEach(function(doc) {
        userMemories.push(doc.data());
        renderMemCard(doc.id, doc.data());
      });
      if(callback) callback();
    }).catch(function(e) {
      memList.innerHTML = "<p class='empty-state'>Error: " + safe(e.message) + "</p>";
      if(callback) callback();
    });
}

function renderMemCard(id, d) {
  var card = document.createElement("div");
  card.className = "memory-card";
  card.innerHTML = "<h4>" + safe(d.title) + "</h4><p>" + safe(d.content) + "</p><button class='memory-del'>🗑</button>";
  card.querySelector(".memory-del").addEventListener("click", function() {
    if (!confirm("Delete this memory?")) { return; }
    db.collection("users").doc(currentUser.uid).collection("memories").doc(id).delete().then(function() {
      card.remove();
      userMemories = userMemories.filter(function(m){ return m.title !== d.title; });
      showToast("Memory deleted.");
      if (!memList.querySelector(".memory-card")) {
        memList.innerHTML = "<p class='empty-state'>No memories yet.</p>";
      }
    });
  });
  memList.appendChild(card);
}

function safe(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/\n/g,"<br>");
}

}());
</script>
